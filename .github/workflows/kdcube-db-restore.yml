name: KDCube DB Restore

on:
  workflow_call:
    inputs:
      from:
        description: Backup stamp or latest
        required: true
        type: string
      only:
        description: pg, influx, redis, or blank for all
        required: false
        default: ""
        type: string
      confirm:
        description: Must be RESTORE to overwrite live data
        required: true
        type: string

jobs:
  restore:
    if: ${{ inputs.confirm == 'RESTORE' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Cloud setup (secrets + SSH key)
        uses: ./.github/actions/cloud-setup
        with:
          env_file: ${{ secrets.KDCUBE_ENV_FILE }}
          ssh_private_key: ${{ secrets.KDCUBE_CLOUD_SSH_PRIVATE_KEY || secrets.BOARD_SSH_PRIVATE_KEY }}
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.KDCUBE_AWS_ROLE_TO_ASSUME || secrets.KDCUBE_AWS_ROLE_TO_ASSUME }}
          role-session-name: kdcube-db-restore
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Restore
        env:
          RESTORE_FROM: ${{ inputs.from }}
          RESTORE_ONLY: ${{ inputs.only }}
        run: |
          set -euo pipefail
          case "${RESTORE_FROM}" in
            latest) : ;;
            20[0-9][0-9][0-1][0-9][0-3][0-9]T[0-2][0-9][0-5][0-9][0-5][0-9]Z) : ;;
            *) echo "invalid --from (expect 'latest' or a UTC stamp like 20260623T120000Z): ${RESTORE_FROM}"; exit 1 ;;
          esac
          case "${RESTORE_ONLY}" in
            ""|pg|influx|redis) : ;;
            *) echo "invalid --only (expect pg|influx|redis or blank): ${RESTORE_ONLY}"; exit 1 ;;
          esac
          only_flag=""
          [ -n "${RESTORE_ONLY}" ] && only_flag="--only ${RESTORE_ONLY}"
          host="$(aws cloudformation describe-stacks --stack-name "${STACK_NAME:-kdcube-yey-boats}" \
            --query "Stacks[0].Outputs[?OutputKey=='PublicDnsName'].OutputValue|[0]" --output text)"
          ssh -i "$KDCUBE_CLOUD_SSH_KEY" -o StrictHostKeyChecking=accept-new "ubuntu@${host}" \
            "sudo bash -c 'set -a; . /opt/kdcube/.db-backup.env; exec /opt/kdcube/scripts/cloud/restore-databases.sh --from ${RESTORE_FROM} ${only_flag} --yes'"
